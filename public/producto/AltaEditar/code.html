<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Apex Enterprise - Nuevo Producto</title>
<!-- Tailwind CSS CDN with forms and container-queries plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-colors">
    /* Custom Apex Enterprise Primary Color */
    .bg-apex-primary { background-color: #0f172a; }
    .text-apex-primary { color: #0f172a; }
    .border-apex-accent { border-color: #e2e8f0; }
  </style>
</head>
<body class="bg-gray-100 text-slate-900 min-h-screen">
<!-- BEGIN: BackgroundOverlay -->
<!-- This represents the background content (Product Table) dimmed and blurred -->
<div aria-hidden="true" class="fixed inset-0 z-0 overflow-hidden filter blur-[2px] brightness-75 px-8 py-10">
<div class="max-w-7xl mx-auto">
<div class="flex justify-between items-center mb-6">
<div>
<h1 class="text-3xl font-bold">Productos</h1>
<p class="text-slate-500 mt-1">Gestiona el inventario, precios y estados de tus artículos comerciales.</p>
</div>
<button class="bg-apex-primary text-white px-4 py-2 rounded-lg flex items-center gap-2">
<span>+</span> Nuevo producto
        </button>
</div>
<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
<div class="flex gap-4 mb-6">
<div class="flex-1">
<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Buscar</label>
<input class="w-full border-slate-200 rounded-lg" placeholder="Nombre del producto..." type="text"/>
</div>
<div class="w-48">
<label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Mostrar</label>
<select class="w-full border-slate-200 rounded-lg">
<option>Solo activos</option>
</select>
</div>
</div>
<table class="w-full text-left text-sm">
<thead class="bg-slate-50 text-slate-400 font-semibold uppercase text-xs">
<tr>
<th class="px-4 py-3">Producto</th>
<th class="px-4 py-3">Precio</th>
<th class="px-4 py-3">Stock</th>
<th class="px-4 py-3">Acciones</th>
</tr>
</thead>
<tbody class="divide-y divide-slate-100">
<tr class="text-slate-600">
<td class="px-4 py-4 flex items-center gap-3">
<div class="w-8 h-8 bg-blue-50 text-blue-600 flex items-center justify-center rounded-lg">📦</div>
                Cable HDMI 2m
              </td>
<td class="px-4 py-4">Bs 12,50</td>
<td class="px-4 py-4"><span class="px-2 py-1 bg-green-50 text-green-700 rounded-full text-xs font-medium">30 unid.</span></td>
<td class="px-4 py-4 flex gap-2">
<button class="px-3 py-1 border border-slate-200 rounded-md text-xs">Editar</button>
<button class="px-3 py-1 bg-red-600 text-white rounded-md text-xs">Desactivar</button>
</td>
</tr>
<tr class="text-slate-600">
<td class="px-4 py-4 flex items-center gap-3">
<div class="w-8 h-8 bg-blue-50 text-blue-600 flex items-center justify-center rounded-lg">📦</div>
                Monitor 24" Full HD
              </td>
<td class="px-4 py-4">Bs 950,00</td>
<td class="px-4 py-4"><span class="px-2 py-1 bg-orange-50 text-orange-700 rounded-full text-xs font-medium">19 unid.</span></td>
<td class="px-4 py-4 flex gap-2">
<button class="px-3 py-1 border border-slate-200 rounded-md text-xs">Editar</button>
<button class="px-3 py-1 bg-red-600 text-white rounded-md text-xs">Desactivar</button>
</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
<!-- END: BackgroundOverlay -->
<!-- BEGIN: ModalContainer -->
<!-- Dark backdrop specifically for the active modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm" data-purpose="modal-overlay">
<!-- BEGIN: ModalContent -->
<div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden" data-purpose="registration-modal">
<!-- Modal Header -->
<div class="px-8 py-6 flex justify-between items-center border-b border-slate-50">
<h2 class="text-xl font-bold text-slate-800">Nuevo producto</h2>
<button aria-label="Cerrar" class="text-slate-400 hover:text-slate-600 transition-colors">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Modal Form -->
<form class="p-8 space-y-6">
<!-- Input: Nombre -->
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-600 mb-1.5" for="product_name">Nombre</label>
<input class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none" id="product_name" name="product_name" placeholder="Ingrese el nombre del producto" type="text"/>
</div>
<!-- Input: Descripción -->
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-600 mb-1.5" for="product_description">Descripción</label>
<textarea class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none resize-none" id="product_description" name="product_description" placeholder="Detalles del producto..." rows="3"></textarea>
</div>
<!-- Row: Precio and Stock -->
<div class="grid grid-cols-2 gap-4">
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-600 mb-1.5" for="product_price">Precio</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">Bs</span>
<input class="w-full pl-9 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none" id="product_price" name="product_price" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
<div data-purpose="form-group">
<label class="block text-sm font-medium text-slate-600 mb-1.5" for="product_stock">Stock inicial</label>
<input class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all outline-none" id="product_stock" name="product_stock" placeholder="0" type="number"/>
</div>
</div>
<!-- Form Actions -->
<div class="pt-4 flex items-center justify-between gap-4">
<button class="px-6 py-2.5 text-slate-500 font-semibold hover:bg-slate-50 rounded-lg transition-colors" type="button">
            Cancelar
          </button>
<button class="flex-1 bg-apex-primary text-white px-6 py-2.5 rounded-lg font-bold shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all active:scale-[0.98]" type="submit">
            Crear producto
          </button>
</div>
</form>
</div>
<!-- END: ModalContent -->
</div>
<!-- END: ModalContainer -->
</body></html>
