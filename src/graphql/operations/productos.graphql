query Productos($soloActivos: Boolean!) {
  productos(soloActivos: $soloActivos) {
    idProducto
    nombreProducto
    descripcion
    precio
    stock
    estado
  }
}

mutation CrearProducto($datos: ProductoInput!) {
  crearProducto(datos: $datos) {
    idProducto
    nombreProducto
    descripcion
    precio
    stock
    estado
  }
}

mutation ActualizarProducto($idProducto: ID!, $datos: ProductoInput!) {
  actualizarProducto(idProducto: $idProducto, datos: $datos) {
    idProducto
    nombreProducto
    descripcion
    precio
    stock
    estado
  }
}

mutation CambiarEstadoProducto($idProducto: ID!, $estado: Boolean!) {
  cambiarEstadoProducto(idProducto: $idProducto, estado: $estado) {
    idProducto
    nombreProducto
    descripcion
    precio
    stock
    estado
  }
}
